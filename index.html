<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleLoot</title>
  <script src="https://telegram.org"></script>
  <style>
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    .roulette-wrapper {
      width: 180px;
      height: 180px;
      margin: 40px auto;
      background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
      border: 3px solid #3b82f6;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .gift-display {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }
    .price-tag {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
      color: #f59e0b;
    }
    .btn-spin {
      background: #2563eb;
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 18px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      width: 85%;
    }
  </style>
</head>
<body>

  <h1>КЕЙС ТЕЛЛС</h1>

  <div class="roulette-wrapper">
    <!-- Запрашиваем картинку закрытого кейса (убедитесь, что файл case.webp лежит на сервере) -->
    <img id="giftImg" class="gift-display" src="/assets/case.webp" alt="Кейс">
  </div>
  
  <div id="priceText" class="price-tag">⭐️ 99 Звёзд</div>
  <button id="spinBtn" class="btn-spin" onclick="clickOpenButton()">Открыть кейс</button>

  <script>
    let tg = window.Telegram?.WebApp || null;
    if (tg) { tg.ready(); tg.expand(); }

    // === ВАШ МАССИВ С ИСПРАВЛЕННОЙ ЗАПЯТОЙ ===
    const gifts = [
      { name: "Artisan Brick 🧱", url: "/assets/RVFBMlJJN1h2SXM5d0pRS3J4a1RiN1l0cGVVdWFELXAwZVQ1dUJlNGJrY0dUMmJk.webp" },
      { name: "Precious Peach 🍑", url: "/assets/RVFBNGk1OGl1UzlEVVlSdFVaOTdzWm81bW5rYmlZVUJwV1hRT2UzZEVVQ2NQMVc4.webp" },
      { name: "Snoop Cigar 🚬", url: "/assets/RVFBNzJVZXZyX01IdnpZd1NDSEpVSy11QzZrZC13OGtieHpoSjQ5V0lpRy1vNkNE.webp" },
      { name: "Vintage Cigar 🍂", url: "/assets/RVFBQ2NRcFIyZm1kZUVOV2RFMllHUVdIVnhTVHlBOFpxNF9rN3JrX0lheENSWE5l.webp" },
      { name: "Scared Cat 🐱", url: "/assets/RVFBVHVVR2R2cmpMdlRXRTVwcFZGT1ZDcVUyZGxDTFVuS1RzdTBuMUpZbTlsYTEw.webp" }
    ];

    let intervalId = null;

    function clickOpenButton() {
      const btn = document.getElementById('spinBtn');
      const img = document.getElementById('giftImg');
      
      btn.disabled = true;
      document.getElementById('priceText').innerText = "⚡️ Открытие...";

      // Безумный перебор картинок
      let counter = 0;
      intervalId = setInterval(() => {
        const randomGift = gifts[Math.floor(Math.random() * gifts.length)];
        img.src = randomGift.url;
        counter++;

        if (counter >= 40) {
          clearInterval(intervalId);
          handlePaymentAndWin();
        }
      }, 60);
    }

    function handlePaymentAndWin() {
      const serverUrl = window.location.origin;
      let userId = tg?.initDataUnsafe?.user?.id || 777;

      fetch(`${serverUrl}/create-invoice`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: userId })
      })
      .then(res => res.json())
      .then(data => {
        if (tg && data.invoiceLink) {
          tg.openInvoice(data.invoiceLink, function(status) {
            if (status === 'paid') {
              showFinalWinner();
            } else {
              alert('Оплата отклонена');
              window.location.reload();
            }
          });
        } else {
          showFinalWinner();
        }
      })
      .catch(() => {
        showFinalWinner(); // Демо-подстраховка для админа
      });
    }

    function showFinalWinner() {
      const btn = document.getElementById('spinBtn');
      const img = document.getElementById('giftImg');

      // Выбираем победителя
      const winner = gifts[Math.floor(Math.random() * gifts.length)];
      img.src = winner.url;

      document.getElementById('priceText').innerHTML = `🎉 Вы выиграли: <br><b>${winner.name}</b>!`;
      btn.innerText = "Закрыть приложение";
      btn.disabled = false;
      btn.onclick = () => { if (tg) tg.close(); else window.location.reload(); };
    }
  </script>
</body>
</html>
