<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleLoot</title>
  <style>
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    .roulette-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 40px auto;
      background: #1e293b;
      border: 3px solid #3b82f6;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .gift-display {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }
    @keyframes fastSpin {
      0% { transform: rotate(0deg); filter: blur(0px); }
      100% { transform: rotate(360deg); filter: blur(2px); }
    }
    .spinning-fast {
      animation: fastSpin 0.3s infinite linear;
    }
    .price-tag {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
      color: #f59e0b;
    }
    .btn-spin {
      background: #2563eb;
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 18px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      width: 85%;
    }
  </style>
</head>
<body>

  <h1>КЕЙС ТЕЛЛС</h1>

  <div class="roulette-wrapper">
    <!-- Главный логотип кейса (большие буквы в названии файла сервер прочитает без проблем) -->
    <img id="giftImg" class="gift-display" src="case.webp" alt="Кейс">
  </div>
  
  <div id="priceText" class="price-tag">⭐️ 99 Звёзд</div>
  <button id="spinBtn" class="btn-spin" onclick="startOpening()">Открыть кейс</button>

  <script>
    // Список ваших .webp подарков (пишем обычными маленькими буквами)
    const gifts = [
      { name: "Artisan Brick", url: "RVFBMlJJN1h2SXM5d0pRS3J4a1RiN1l0cGVVdWFELXAwZVQ1dUJlNGJrY0dUMmJk.webp" },
      { name: "Precious Peach", url: "RVFBNGk1OGl1UzlEVVlSdFVaOTdzWm81bW5rYmlZVUJwV1hRT2UzZEVVQ2NQMVc4.webp" },
      { name: "Snoop Cigar", url: "RVFBNzJVZXZyX01IdnpZd1NDSEpVSy11QzZrZC13OGtieHpoSjQ5V0lpRy1vNkNE.webp" },
      { name: "Vintage Cigar", url: "RVFBQ2NRcFIyZm1kZUVOV2RFMllHUVdIVnhTVHlBOFpxNF9rN3JrX0lheENSWE5l.webp" }
      { name: "Scared Cat", url: "RVFBVHVVR2R2cmpMdlRXRTVwcFZGT1ZDcVUyZGxDTFVuS1RzdTBuMUpZbTlsYTEw.webp" },
    ];


    function startOpening() {
      const btn = document.getElementById('spinBtn');
      const img = document.getElementById('giftImg');
      
      // Блокируем кнопку и запускаем крутилку мгновенно при клике!
      btn.disabled = true;
      img.className = "gift-display spinning-fast";
      document.getElementById('priceText').innerText = "⚡️ Открытие...";

      // Ровно через 2 секунды останавливаем вращение и показываем приз
      setTimeout(() => {
        const winner = gifts[Math.floor(Math.random() * gifts.length)];
        
        img.className = "gift-display"; 
        img.src = winner.url; // Подставляем картинку подарка .webp из вашей папки
        
        document.getElementById('priceText').innerHTML = `🎉 Выиграно: <b>${winner.name}</b>!`;
        btn.innerText = "Готово";
        btn.disabled = false;
        btn.onclick = () => { window.location.reload(); }; // Перезапуск при повторном клике
      }, 2000);
    }
  </script>
</body>
</html>
