<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleLoot — Кейсы</title>
  <script src="https://telegram.org"></script>
  <style>
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }

    .case-title {
      font-size: 26px;
      font-weight: 800;
      margin-top: 20px;
      background: linear-gradient(45deg, #38bdf8, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Окно рулетки */
    .roulette-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      height: 160px;
      margin: 40px auto 20px auto;
      background: #1e293b;
      border-radius: 20px;
      border: 2px solid #3b82f6;
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
      overflow: hidden;
    }

    /* Синяя неоновая стрелочка-указатель по центру */
    .roulette-marker {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 100%;
      background: #38bdf8;
      box-shadow: 0 0 15px #38bdf8;
      z-index: 10;
    }
    .roulette-marker::before {
      content: '▼';
      position: absolute;
      top: -2px;
      left: -6px;
      color: #38bdf8;
      font-size: 14px;
    }

    /* Длинная движущаяся лента */
    .roulette-tape {
      display: flex;
      align-items: center;
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
    }

    /* Карточка с подарком */
    .gift-card {
      width: 120px;
      height: 120px;
      margin: 0 10px; /* Итого ширина карточки с отступами = 140px */
      background: radial-gradient(circle, #334155 0%, #1e293b 100%);
      border: 1px solid #475569;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .gift-card img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    .price-tag {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #f59e0b;
    }

    .btn-spin {
      background: #2563eb;
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 18px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      width: 85%;
      max-width: 300px;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
      transition: all 0.3s ease;
    }

    .btn-spin:disabled {
      background: #475569;
      box-shadow: none;
      cursor: not-allowed;
    }

    @keyframes winPulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 5px #38bdf8); }
      100% { transform: scale(1.08); filter: drop-shadow(0 0 20px #38bdf8); }
    }
    .winner-anim {
      animation: winPulse 0.5s infinite alternate ease-in-out;
      border-color: #38bdf8 !important;
    }
  </style>
</head>
<body>

  <div class="case-title">КЕЙС ТЕЛЛС</div>

  <div class="roulette-wrapper">
    <div class="roulette-marker"></div>
    <div id="rouletteTape" class="roulette-tape">
      <!-- Коробка сюрприза на старте -->
    </div>
  </div>
  
  <div id="priceText" class="price-tag">⭐️ 99 Звёзд</div>
  <button id="spinBtn" class="btn-spin" onclick="startPurchase()">Открыть кейс</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const serverUrl = window.location.origin;

    // Имена официальных подарков в системе Fragment
    const giftNames = ["plushpepe", "durovscap", "jellybunny", "magichat", "homemadecake", "spicedwine"];

    const tape = document.getElementById('rouletteTape');
    const CARD_FULL_WIDTH = 140; 

    function initCase() {
      tape.style.transition = 'none';
      tape.style.transform = 'translateX(0px)';
      tape.innerHTML = `
        <div class="gift-card" style="margin-left: 110px;">
          <img src="https://telegram.org" alt="Кейс">
        </div>
      `;
    }
    initCase();

    function startPurchase() {
      document.getElementById('spinBtn').disabled = true;

      fetch(`${serverUrl}/create-invoice`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: tg.initDataUnsafe.user?.id || 0 })
      })
      .then(res => res.json())
      .then(data => {
        tg.openInvoice(data.invoiceLink, function(status) {
          if (status === 'paid') {
            generateAndSpin();
          } else {
            alert('Оплата отменена');
            document.getElementById('spinBtn').disabled = false;
          }
        });
      })
      .catch(() => {
        // ДЕМО-РЕЖИМ (Сработает при тесте без оплаты)
        generateAndSpin();
      });
    }

    function generateAndSpin() {
      tape.innerHTML = ''; 
      tape.style.transition = 'none'; 
      tape.style.transform = 'translateX(0px)';

      const totalCards = 30; 
      const winningIndex = 24; 
      let winningGiftName = '';
      
      for (let i = 0; i < totalCards; i++) {
        const randomName = giftNames[Math.floor(Math.random() * giftNames.length)];
        
        const card = document.createElement('div');
        card.className = 'gift-card';
        card.id = `card-${i}`;
        
        const img = document.createElement('img');
        // Запрашиваем картинку через наш собственный рабочий прокси-сервер Railway
        img.src = `${serverUrl}/proxy-gift?name=${randomName}`;
        
        card.appendChild(img);
        tape.appendChild(card);

        if (i === winningIndex) {
          winningGiftName = randomName;
        }
      }

      const wrapperWidth = 340;
      const centerOffset = (wrapperWidth / 2) - (CARD_FULL_WIDTH / 2);
      const stopX = -(winningIndex * CARD_FULL_WIDTH) + centerOffset;

      // Принудительно заставляем браузер просчитать ленту перед запуском
      tape.offsetHeight;

      setTimeout(() => {
        // Плавная прокрутка: резкий старт и красивое торможение казино
        tape.style.transition = 'transform 4.5s cubic-bezier(0.1, 0.4, 0.1, 1)';
        tape.style.transform = `translateX(${stopX}px)`;
      }, 100);

      // Остановка и фиксация победителя
      setTimeout(() => {
        const winnerCard = document.getElementById(`card-${winningIndex}`);
        if(winnerCard) winnerCard.classList.add('winner-anim');

        // Переводим техническое название подарка на красивый русский язык
        const prettyNames = {
          plushpepe: "Plush Pepe 🐸",
          durovscap: "Durov's Cap 👑",
          jellybunny: "Jelly Bunny 🐰",
          magichat: "Magic Hat 🎩",
          homemadecake: "Homemade Cake 🍰",
          spicedwine: "Spiced Wine 🍷"
        };

        document.getElementById('priceText').innerHTML = `🎉 Вы выиграли: ${prettyNames[winningGiftName] || winningGiftName}! 🎉`;
        document.getElementById('spinBtn').innerText = "Забрать лут";
        document.getElementById('spinBtn').disabled = false;
        
        document.getElementById('spinBtn').onclick = function() {
          tg.close();
        };
      }, 4600);
    }
  </script>
</body>
</html>
