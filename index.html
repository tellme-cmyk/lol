<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>TeleLoot</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="background"></div>

<header>

<h1>🎁 TeleLoot</h1>

<p>
Открывай настоящие Telegram Gifts
</p>

</header>

<main>

<div class="case-box">

<div class="case-top">

<img

id="caseImage"

class="case-image"

src="/assets/case.webp"

>

</div>

<div class="price">

⭐ 99 Stars

</div>

<button

id="openButton"

class="open-button">

ОТКРЫТЬ КЕЙС

</button>

</div>

<div class="roulette-wrapper">

<div class="roulette-arrow">

▼

</div>

<div

id="roulette"

class="roulette">

<div

id="rouletteTrack"

class="roulette-track">

</div>

</div>

</div>

<div

id="winCard"

class="hidden">

<img

id="winImage"

class="result-image"

>

<h2 id="winName"></h2>

<p id="winPrice"></p>

<p id="winRarity"></p>

<button

id="againButton">

Открыть ещё

</button>

</div>
<div id="inventoryPage" class="inventory hidden">

    <h2 class="inventory-title">🎒 Инвентарь</h2>

    <div id="inventoryGrid" class="inventory-grid"></div>

</div>
    <div id="upgradePage" class="inventory hidden">

    <h2>💎 Апгрейд</h2>

    <div id="upgradeInventory" class="inventory-grid"></div>

    <div class="upgrade-panel">

        <p id="upgradeInfo">Выбери предмет</p>

        <button id="startUpgrade">АПГРЕЙД</button>

    </div>

    </div>
</main>

<nav>

<button id="inventoryBtn">

🎒

<br>

Инвентарь

</button>

<button id="upgradeBtn">

💎

<br>

Апгрейд

</button>

<button id="profileBtn">

👤

<br>

Профиль

</button>

</nav>

<script src="script.js"></script>

</body>

</html>
